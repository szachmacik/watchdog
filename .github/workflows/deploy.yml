name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          echo "Deploying watchdog → Coolify uuid=g8csck0kw8c0sc0cosg0cw84"
          curl -s -f -X POST \
            "https://coolify.ofshore.dev/api/v1/deploy?uuid=g8csck0kw8c0sc0cosg0cw84&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            && echo "✅ Deploy triggered" || echo "⚠️ Deploy trigger failed (non-critical)"
